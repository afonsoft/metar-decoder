name: 🔒 Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1" # Weekly on Monday at 2 AM UTC

jobs:
  # CodeQL Analysis
  codeql:
    name: 🔍 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["csharp"]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🔍 Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: 🔍 Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: 🔍 Perform Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  # Snyk Security Scan
  snyk:
    name: 🛡️ Snyk Security
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🗄️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: 🔧 Restore Dependencies
        run: dotnet restore MetarDecoder.sln --ignore-failed-sources

      - name: 🛡️ Install Snyk CLI
        run: |
          curl -s https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x ./snyk
          sudo mv ./snyk /usr/local/bin/

      - name: 🛡️ Run Snyk Security Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "⚠️ SNYK_TOKEN is not set or empty, skipping Snyk scan"
            exit 0
          fi
          snyk test --severity-threshold=high --all-projects

  # SonarQube Analysis
  sonarqube:
    name: 📊 SonarQube Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 📦 Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: 🗄️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "zulu"

      - name: 🔧 Clear NuGet cache
        run: dotnet nuget locals all --clear

      - name: 📦 Install SonarQube Tools
        run: dotnet tool install --global --ignore-failed-sources dotnet-sonarscanner

      - name: 📦 Install Coverlet Tools
        run: dotnet tool install --global --ignore-failed-sources coverlet.console

      - name: 🔧 Fix Permission
        run: chmod 777 sonar/ -R || true

      - name: 🔍 Prepare analysis on SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN || secrets.SONAR_TOKEN }}
        run: |
          echo "🔍 Checking SonarQube configuration..."
          if [ -z "$SONAR_TOKEN" ]; then
            echo "❌ SONAR_TOKEN is not set or empty"
            echo "⚠️ Skipping SonarQube analysis"
            exit 0
          fi

          echo "✅ SONAR_TOKEN is configured"
          dotnet sonarscanner begin \
            /o:"afonsoft" \
            /k:"afonsoft_metar-decoder" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.scm.provider=git \
            /d:sonar.coverage.exclusions="**Test*.cs"

      - name: 🏗️ Build
        run: dotnet build MetarDecoder.sln --configuration release

      - name: 🔍 Run Code Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN || secrets.SONAR_TOKEN }}
        run: |
          echo "🔍 Finalizing SonarQube analysis..."
          if [ -z "$SONAR_TOKEN" ]; then
            echo "⚠️ SONAR_TOKEN not configured, skipping analysis"
            exit 0
          fi

          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  # Security Summary
  security-summary:
    name: 📋 Security Summary
    runs-on: ubuntu-latest
    needs: [codeql, snyk, sonarqube]
    if: always()

    steps:
      - name: 📋 Generate Security Report
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Snyk | ${{ needs.snyk.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 SonarQube | ${{ needs.sonarqube.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.codeql.result }}" == "failure" || "${{ needs.snyk.result }}" == "failure" || "${{ needs.sonarqube.result }}" == "failure" ]]; then
            echo "❌ **Security issues detected! Please review the scan results.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All security scans passed successfully!**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🚨 Security Alert
        if: needs.codeql.result == 'failure' || needs.snyk.result == 'failure' || needs.sonarqube.result == 'failure'
        run: |
          echo "🚨 SECURITY ISSUES DETECTED!"
          echo "Please review the security scan results immediately."
