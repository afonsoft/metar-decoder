name: OpenCode Auto-Fix

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  opencode:
    if: github.event.label.name == 'fix-me'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    env:
      OMNIROUTE_BASE_URL: https://omniroute.afonsoft.dev/v1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@49c69c5ed3ccf706b61b3febb43c8aaff7f8325e # v1.18.4
        env:
          OMNIROUTE_API_KEY: ${{ secrets.OMNIROUTE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: omniroute/auto/claude-sonnet
          agent: build
          use_github_token: true
          prompt: |
            Fix the issue or implement the feature described.
            Open a pull request with the changes and provide a clear summary.
