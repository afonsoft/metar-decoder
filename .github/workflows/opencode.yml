name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
      (
        github.event.comment.body == '/oc' ||
        startsWith(github.event.comment.body, '/oc ') ||
        github.event.comment.body == '/opencode' ||
        startsWith(github.event.comment.body, '/opencode ')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    env:
      OMNIROUTE_BASE_URL: https://omniroute.afonsoft.dev/v1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@49c69c5ed3ccf706b61b3febb43c8aaff7f8325e # v1.18.4
        env:
          OMNIROUTE_API_KEY: ${{ secrets.OMNIROUTE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: omniroute/auto/claude-sonnet
          agent: build
          use_github_token: true
